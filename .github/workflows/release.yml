name: Release

on:
  push:
    tags: ['v[0-9]+.*']

# Prevent concurrent release builds
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate: run the full CI suite first
  test:
    name: Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build (debug)
        run: swift build

      - name: Run tests
        run: swift test

  # Build, sign, notarize, and publish
  release:
    name: Release
    needs: test
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build release binary
        run: swift build -c release --arch arm64

      - name: Verify binary
        run: |
          file .build/release/junco
          .build/release/junco --version

      # --- Code Signing ---
      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_CERT }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"

          # Decode certificate
          echo -n "$DEVELOPER_ID_CERT" | base64 --decode -o "$CERT_PATH"

          # Create temporary keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Sign binary
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          codesign --sign "$SIGNING_IDENTITY" \
            --options runtime --timestamp \
            --force \
            .build/release/junco
          # Verify signature
          codesign --verify --verbose .build/release/junco

      # --- Notarization ---
      - name: Notarize binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # notarytool requires a zip/pkg/dmg — zip the signed binary
          ditto -c -k --keepParent .build/release/junco junco-notarize.zip

          xcrun notarytool submit junco-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 600

          rm junco-notarize.zip

      # --- Prepare Release Assets ---
      - name: Prepare assets
        run: |
          cp .build/release/junco junco-arm64
          shasum -a 256 junco-arm64 > checksums.txt
          echo "Binary SHA-256:"
          cat checksums.txt

      # --- Create GitHub Release ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "junco v${{ env.VERSION }}"
          generate_release_notes: true
          files: |
            junco-arm64
            checksums.txt
